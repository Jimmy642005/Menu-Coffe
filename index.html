<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú - Café Dulce Nostalgia</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="menu-container">
        <header class="header">
            <div class="logo">
                <p class="tagline">COFFE</p>
            </div>
            <h1>MENÚ</h1>
            <p class="motto">EL BEBER UN CAFE ES PLACER</p>
        </header>

        <section class="section-drinks">
            <table>
                <thead>
                    <tr>
                        <th class="col-main">CLASICOS</th>
                        <th colspan="2" class="text-center">HOT</th>
                        <th class="text-center">FRIOS</th>
                    </tr>
                    <tr class="sub-header">
                        <th></th>
                        <th>12 OZ</th>
                        <th>16 OZ</th>
                        <th>16 OZ</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>Americano</td>
                        <td>$45</td>
                        <td>$50</td>
                        <td>$55</td>
                    </tr>
                   
                    <tr>
                        <td>White Moka</td>
                        <td>$60</td>
                        <td>$75</td>
                        <td>$75</td>
                    </tr>
                    
                    <tr>
                        <td>Chai</td>
                        <td>$60</td>
                        <td>$80</td>
                        <td>$80</td>
                    </tr>
                    <tr>
                        <td>Chai Sucio</td>
                        <td>$70</td>
                        <td>$85</td>
                        <td>$85</td>
                    </tr>
                </tbody>
            </table>
        </section>

        <hr class="divider">

        <section class="extras-section">
            <h3>ESENCIAS</h3>
            <div class="esencias-grid">
                <ul>
                    <li>CARAMELO</li>
                    <li>CHOCOLATE</li>
                </ul>
            </div>

            <div class="extras-list">
                <h3>EXTRAS</h3>
                <div class="extra-item"><span>ESENCIAS</span> <span>$10</span></div>
                <div class="extra-item"><span>SHOT ESPRESSO</span> <span>$10</span></div>
                <div class="extra-item"><span>COLD FOAM</span> <span>$15</span></div>
            </div>
        </section>

        <footer class="footer">
            <div class="qr-section">
                <p>Síguenos</p>
                <div class="qr-placeholder">QR</div>
            </div>
        </footer>
    </div>

</body>
</html>
